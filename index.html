<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinVault Mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Kişisel Finans</p>
          <h1 id="screenTitle">Nakit Akışı</h1>
        </div>
        <button class="pill primary" id="quickAddBtn">İşlem ekle</button>
      </header>

      <main id="viewRoot" class="view-root"></main>

      <nav class="bottom-nav" aria-label="Alt menü">
        <button data-tab="cashflow" class="nav-item active">Akış</button>
        <button data-tab="analytics" class="nav-item">Analitik</button>
        <button data-tab="payments" class="nav-item">Yaklaşan</button>
        <button data-tab="extras" class="nav-item">Ekstra</button>
        <button data-tab="settings" class="nav-item">Ayarlar</button>
      </nav>
    </div>

    <dialog id="transactionModal" class="sheet">
      <form id="transactionForm" class="sheet-content" method="dialog">
        <div class="sheet-header">
          <h2 id="transactionModalTitle">İşlem Ekle</h2>
          <button class="icon-btn" type="button" id="closeTxModal">✕</button>
        </div>
        <div class="grid-2">
          <label>Tür
            <select name="type" required>
              <option value="income">Gelir</option>
              <option value="expense">Gider</option>
            </select>
          </label>
          <label>Tutar
            <input name="amount" type="number" min="0" step="0.01" required />
          </label>
        </div>
        <label>Başlık
          <input name="title" required />
        </label>
        <div class="grid-2">
          <label>Kategori
            <input name="category" list="categoryList" required />
          </label>
          <label>Tarih
            <input name="date" type="date" required />
          </label>
        </div>
        <div class="grid-2">
          <label>Cüzdan
            <input name="wallet" list="walletList" required />
          </label>
          <label>Etiketler (virgül)
            <input name="tags" placeholder="market, aile" />
          </label>
        </div>
        <label>Not
          <textarea name="notes" rows="2"></textarea>
        </label>
        <label class="toggle-row">
          <input type="checkbox" name="recurring" />
          <span>Tekrarlayan işlem</span>
        </label>
        <div class="sheet-actions">
          <button class="pill" type="button" id="deleteTransactionBtn">Sil</button>
          <button class="pill primary" type="submit">Kaydet</button>
        </div>
      </form>
    </dialog>

    <dialog id="entityModal" class="sheet">
      <form id="entityForm" class="sheet-content" method="dialog">
        <div class="sheet-header">
          <h2 id="entityModalTitle">Yeni Kayıt</h2>
          <button class="icon-btn" type="button" id="closeEntityModal">✕</button>
        </div>
        <label>Ad
          <input name="name" required />
        </label>
        <label id="entitySecondaryWrap">Hedef / Ek Bilgi
          <input name="secondary" />
        </label>
        <div class="sheet-actions">
          <button class="pill primary" type="submit">Kaydet</button>
        </div>
      </form>
    </dialog>

    <datalist id="categoryList"></datalist>
    <datalist id="walletList"></datalist>

    <script src="scripts/state.js"></script>
    <script src="scripts/ui.js"></script>
  </body>
</html>
